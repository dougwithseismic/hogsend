# Build the docs from a DEDICATED Dockerfile (Dockerfile.docs), NOT railpack and
# NOT the root /Dockerfile (which builds the API). `builder = "RAILPACK"` did not
# reliably stop Railway from preferring the root Dockerfile for this service — it
# kept building the API image, which has no docs output, so the deploy failed
# with a missing server entry. Pointing dockerfilePath at Dockerfile.docs makes
# the build deterministic: this service builds exactly the docs image.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.docs"
watchPatterns = ["apps/docs/**", "Dockerfile.docs", "pnpm-lock.yaml", "railway.docs.toml"]

[deploy]
# Dockerfile.docs ships the Next.js standalone output, so the server entry is the
# self-contained apps/docs/server.js (it bundles its own node_modules — no pnpm,
# no workspace, no corepack). server.js reads PORT from env; HOSTNAME=0.0.0.0
# (set in Dockerfile.docs) lets it accept external connections. This matches the
# image's CMD; kept explicit for parity with the API service config.
startCommand = "node apps/docs/server.js"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
