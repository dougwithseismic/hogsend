commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm biome check --staged --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    # Affected-only: scope both gates to workspaces changed vs origin/main.
    # A docs-only push skips the DB-backed api suite entirely; CI remains the
    # authoritative full-suite gate on every PR/push.
    check-types:
      run: pnpm exec turbo run check-types --filter='...[origin/main]'
    test:
      run: pnpm exec turbo run test --filter='...[origin/main]'
