[build]
buildCommand = "pnpm --filter @growthhog/api build"
watchPatterns = ["apps/api/**", "packages/db/**", "packages/typescript-config/**", "package.json", "pnpm-lock.yaml", "railway.toml"]

[deploy]
startCommand = "pnpm --filter @growthhog/api start"
healthcheckPath = "/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
