[build]
buildCommand = "pnpm --filter @hogsend/api build"
# Watch the whole monorepo source so engine/shared-package changes trigger a
# redeploy. The previous list only covered apps/api + packages/db, so edits to
# packages/engine (the entire API runtime), packages/core, packages/email, and
# the plugin packages silently did NOT redeploy this service. @hogsend/api
# bundles all of packages/** via tsup noExternal, so any of them is a real input.
# Override in the dashboard if you need a narrower scope.
watchPatterns = ["apps/api/**", "packages/**", "package.json", "pnpm-lock.yaml", "railway.toml"]

[deploy]
# Two-track migrations: engine MUST succeed first, then the client track. The
# client shim (db:migrate:client) skips gracefully when CLIENT_MIGRATIONS_FOLDER
# is unset/absent/empty, so this same command works for this dogfood repo (no
# client migrations) and for scaffolded client repos (which set the env var).
preDeployCommand = "pnpm --filter @hogsend/db db:migrate && pnpm --filter @hogsend/db db:migrate:client"
startCommand = "pnpm --filter @hogsend/api start"
healthcheckPath = "/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
