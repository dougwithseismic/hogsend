name: Release

# Two-phase changesets release. CONFIG-ONLY in this repo today; runs only in CI.
#
#   Phase A — a merge to `main` that carries unreleased changesets ⇒
#             changesets/action opens/updates a "Version Packages" PR that runs
#             `pnpm changeset version` (bumps versions, writes CHANGELOGs,
#             deletes the consumed changeset files).
#   Phase B — merging that "Version Packages" PR (no changesets left, versions
#             already bumped) ⇒ the action runs `publish` (`pnpm release`),
#             publishing the public @hogsend/* packages + create-hogsend to npm
#             and pushing git tags (e.g. @hogsend/engine@1.4.0).
#
# `changeset publish` automatically SKIPS private packages, so @hogsend/api,
# growthhog (root), and @repo/typescript-config are never published.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight publish

permissions:
  contents: write # push tags + the version-bump commit/PR
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # npm provenance (OIDC) — see provenance note below

env:
  NODE_VERSION: "22"
  # Never run local git hooks in CI. The changesets action commits + force-pushes
  # the "Version Packages" branch (and, on publish, pushes tags); those git
  # operations fire lefthook's pre-push hook, which runs `pnpm test` — a DB-backed
  # vitest suite with no database in this job — so the push hangs until the runner
  # cancels it and no Version PR is ever created. This job already runs
  # check-types + build + release-doctor as explicit gates, so the hooks are pure
  # dead weight here.
  LEFTHOOK: "0"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - run: npm install --global npm@latest
      - run: pnpm install --frozen-lockfile
      # Gate: the engine line must type-check and build before we publish
      # anything. `pnpm release` also runs `pnpm build` again as a publish guard.
      - run: pnpm check-types
      - run: pnpm build
      # Release-integrity gate: assert the version-line invariants (ENGINE_VERSION
      # in sync, engine-line uniform, the three scaffold lists agree, no
      # force-major peer, no migration-number collision) before versioning or
      # publishing.
      - run: pnpm release-doctor
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # `version-packages` = `changeset version` then `release-doctor --sync`,
          # so the Version PR always carries an ENGINE_VERSION matching the
          # freshly-bumped engine — no manual constant edit, no stale scaffold.
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN: an npm token with publish rights to the public packages,
          # stored as a repo secret. changeset publish reads NODE_AUTH_TOKEN for
          # npm auth; we mirror NPM_TOKEN into it.
          #
          # NOTE: Trusted Publishing (OIDC) is the tokenless end state — npm mints a
          # short-lived, workflow-scoped token at publish time (id-token: write is
          # already set above). Migration in progress; once every public package has
          # a Trusted Publisher, delete this secret and drop these two env lines.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # CI green != published: a brand-new package's first publish can be reported
      # as success while the registry 404s. Verify every just-published version
      # actually resolves on npm and fail loudly if not.
      - name: Verify published packages resolve on npm
        if: steps.changesets.outputs.published == 'true'
        run: node scripts/verify-published.mjs '${{ steps.changesets.outputs.publishedPackages }}'
