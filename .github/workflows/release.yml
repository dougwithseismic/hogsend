name: Release

# Two-phase changesets release. CONFIG-ONLY in this repo today; runs only in CI.
#
#   Phase A — a merge to `main` that carries unreleased changesets ⇒
#             changesets/action opens/updates a "Version Packages" PR that runs
#             `pnpm changeset version` (bumps versions, writes CHANGELOGs,
#             deletes the consumed changeset files).
#   Phase B — merging that "Version Packages" PR (no changesets left, versions
#             already bumped) ⇒ the action runs `publish` (`pnpm release`),
#             publishing the public @hogsend/* packages + create-hogsend to npm
#             and pushing git tags (e.g. @hogsend/engine@1.4.0).
#
# `changeset publish` automatically SKIPS private packages, so @hogsend/api,
# growthhog (root), and @repo/typescript-config are never published.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight publish

permissions:
  contents: write # push tags + the version-bump commit/PR
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # npm provenance (OIDC) — see provenance note below

env:
  NODE_VERSION: "22"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - run: npm install --global npm@latest
      - run: pnpm install --frozen-lockfile
      # Gate: the engine line must type-check and build before we publish
      # anything. `pnpm release` also runs `pnpm build` again as a publish guard.
      - run: pnpm check-types
      - run: pnpm build
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN: an npm token with publish rights to @hogsend/* and
          # create-hogsend, stored as the repo secret NPM_TOKEN. changeset publish
          # reads NODE_AUTH_TOKEN for npm auth; we mirror NPM_TOKEN into it.
          #
          # NOTE: Trusted Publishing (OIDC) is the better, tokenless end state and
          # 5 of 8 packages already have a Trusted Publisher configured
          # (GitHub Actions → dougwithseismic/hogsend → release.yml). To finish the
          # migration: add a Trusted Publisher to plugin-resend, cli, and
          # create-hogsend, then delete this secret + drop these two env lines.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
