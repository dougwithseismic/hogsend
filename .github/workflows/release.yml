name: Release

# Two-phase changesets release. CONFIG-ONLY in this repo today; runs only in CI.
#
#   Phase A — a merge to `main` that carries unreleased changesets ⇒
#             changesets/action opens/updates a "Version Packages" PR that runs
#             `pnpm changeset version` (bumps versions, writes CHANGELOGs,
#             deletes the consumed changeset files).
#   Phase B — merging that "Version Packages" PR (no changesets left, versions
#             already bumped) ⇒ the action runs `publish` (`pnpm release`),
#             publishing the public @hogsend/* packages + create-hogsend to npm
#             and pushing git tags (e.g. @hogsend/engine@1.4.0).
#
# `changeset publish` automatically SKIPS private packages, so @hogsend/api,
# growthhog (root), and @repo/typescript-config are never published.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight publish

permissions:
  contents: write # push tags + the version-bump commit/PR
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # npm provenance (OIDC) — see provenance note below

env:
  NODE_VERSION: "22"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - run: npm install --global npm@latest
      - run: pnpm install --frozen-lockfile
      # Gate: the engine line must type-check and build before we publish
      # anything. `pnpm release` also runs `pnpm build` again as a publish guard.
      - run: pnpm check-types
      - run: pnpm build
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — this workflow publishes via npm TRUSTED PUBLISHING
          # (OIDC). The `id-token: write` permission above, plus a Trusted
          # Publisher configured on each package (npmjs.com → package → Settings →
          # GitHub Actions → dougwithseismic/hogsend → workflow `release.yml`),
          # lets `npm publish` (invoked by `changeset publish`) mint a short-lived,
          # workflow-scoped OIDC token automatically — nothing long-lived stored.
          # npm >= 11.5.1 (installed above) attaches build provenance for free.
          #
          # Prereq: a package must be published once before a Trusted Publisher
          # can be added to it. The initial 0.0.1 versions were bootstrapped via a
          # local publish; every release from here is tokenless OIDC.
