name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  quality:
    name: Lint & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm check-types
      # Full build (incl. the Next docs site). check-types runs fumadocs-mdx +
      # tsc but does NOT compile MDX, so a bad MDX expression (bare `{}` outside
      # code) only fails `next build`. Build here so it's caught on every push,
      # not just in the release workflow's publish guard.
      - run: pnpm build

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      # Mirror the local docker-compose dev DB (port 5434, growthhog creds) that
      # the integration tests connect to. The superuser role lets the migration
      # test create/drop its own throwaway database.
      postgres:
        image: timescale/timescaledb:latest-pg18
        env:
          POSTGRES_USER: growthhog
          POSTGRES_PASSWORD: growthhog
          POSTGRES_DB: growthhog
        ports: ["5434:5432"]
        options: >-
          --health-cmd "pg_isready -U growthhog"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # better-auth's secondaryStorage (sessions, rate-limit, password-reset
      # tokens) and the PostHog cache use Redis — mirror prod so the integration
      # tests (e.g. the password-reset e2e) have a reachable Redis.
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://growthhog:growthhog@localhost:5434/growthhog
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: pnpm --filter @hogsend/db db:migrate
      - run: pnpm test

  migrations:
    name: Migration safety
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hogsend
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGURL: postgres://postgres:postgres@localhost:5432
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/hogsend
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history for the upgrade-from-previous test
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # 1. Schema drift: committed migrations must match the Drizzle schema.
      #    `db:generate` is offline (schema vs. migration snapshot, no DB).
      - name: Check for uncommitted schema changes
        run: |
          pnpm --filter @hogsend/db db:generate
          if ! git diff --quiet -- packages/db/drizzle; then
            echo "::error::Schema changed without a committed migration. Run 'pnpm --filter @hogsend/db db:generate' and commit the result."
            git diff -- packages/db/drizzle
            exit 1
          fi

      # 2. Fresh apply: every migration applies cleanly from an empty database.
      - name: Migrate fresh database (0000 -> head)
        run: pnpm --filter @hogsend/db db:migrate

      # 3. Idempotency: re-running is a no-op (the hardened migrator detects this).
      - name: Migrate again is a no-op
        run: pnpm --filter @hogsend/db db:migrate

      # 3a. Client track fresh apply. Reuses the vitest fixture as the canonical
      #     sample client track (there is no production client folder in-repo).
      #     Applies into drizzle.__client_migrations, leaving the engine ledger
      #     untouched.
      # An absolute path is required: `pnpm --filter` runs the shim with cwd
      # packages/db, so a relative folder would not resolve.
      - name: Migrate client track (fresh apply)
        env:
          CLIENT_MIGRATIONS_FOLDER: ${{ github.workspace }}/apps/api/src/__tests__/fixtures/client-migrations
        run: pnpm --filter @hogsend/db db:migrate:client

      # 3b. Client track idempotency: re-running is a no-op (exit 0 + already-up).
      - name: Migrate client track again is a no-op
        env:
          CLIENT_MIGRATIONS_FOLDER: ${{ github.workspace }}/apps/api/src/__tests__/fixtures/client-migrations
        run: |
          out=$(pnpm --filter @hogsend/db db:migrate:client 2>&1)
          echo "$out"
          echo "$out" | grep -qi "already up to date"

      # 4. Upgrade path: apply the PREVIOUS release's migrations + seed data,
      #    then apply this PR's migrations on top — catches data-dependent
      #    failures (NOT NULL on existing rows, constraints over real values)
      #    that a fresh apply never sees.
      - name: Upgrade from previous release (with data)
        run: |
          set -euo pipefail
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            BASE="origin/${GITHUB_BASE_REF}"
          else
            BASE="HEAD^"
          fi
          echo "Upgrade base: $BASE"
          psql "$PGURL/postgres" -c 'DROP DATABASE IF EXISTS upgrade_test;'
          psql "$PGURL/postgres" -c 'CREATE DATABASE upgrade_test;'

          # Roll the db package back to the base release, apply + seed it.
          git checkout "$BASE" -- packages/db
          DATABASE_URL="$PGURL/upgrade_test" pnpm --filter @hogsend/db db:migrate
          DATABASE_URL="$PGURL/upgrade_test" pnpm --filter @hogsend/db db:seed || \
            echo "::warning::Base seed failed or absent — running upgrade without seeded data."

          # Restore this PR's migrations and upgrade the populated database.
          git checkout HEAD -- packages/db
          DATABASE_URL="$PGURL/upgrade_test" pnpm --filter @hogsend/db db:migrate

          # Prove engine-upgrade-then-client-apply on a populated DB. The client
          # fixture lives under apps/api (not packages/db), so the rollback above
          # never touched it; apply it on top of the upgraded engine schema.
          CLIENT_MIGRATIONS_FOLDER="$GITHUB_WORKSPACE/apps/api/src/__tests__/fixtures/client-migrations" \
            DATABASE_URL="$PGURL/upgrade_test" pnpm --filter @hogsend/db db:migrate:client

  preflight:
    name: Deploy preflight (prod image builds + boots)
    runs-on: ubuntu-latest
    # The runtime gate lint/types/tests can't provide: build the production image
    # exactly as Railway does (the Dockerfile) and boot every run mode. This is
    # the class of failure that repeatedly reached prod — a tsup noExternal gap
    # (ERR_MODULE_NOT_FOUND), a pnpm-based start command (EACCES on /app), a
    # winston File transport (mkdir /app/logs). The runner has Docker; the script
    # needs neither Node nor pnpm on the host (the build runs inside the image).
    steps:
      - uses: actions/checkout@v5
      - name: Build prod image and boot api/worker/migrate
        run: bash scripts/preflight-deploy.sh

  release-integrity:
    name: Release integrity
    runs-on: ubuntu-latest
    # The version-line + publish-shape invariants that otherwise live only in
    # docs/RELEASING.md and the release skill — turned into a gate. Catches the
    # silent ways a release degrades: ENGINE_VERSION drifting from the engine
    # line (fresh scaffolds stuck a minor behind), the three scaffold package
    # lists disagreeing, a force-major peer trap, a migration-number collision,
    # or a built-dist package missing from its tarball.
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Fast, deterministic version-line invariants (pure file reads, ~1s).
      - run: pnpm release-doctor
      # Heavier real pack -> scaffold -> install -> build smoke (dist-in-tarball).
      # Skip it only when we can PROVE no packaging surface changed (fail-open:
      # run when the base sha is unavailable or any packaging path changed).
      - name: Scope the scaffold smoke
        id: scope
        run: |
          run=true
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -n "$base" ] && git cat-file -e "$base" 2>/dev/null; then
            if ! git diff --name-only "$base"...HEAD | grep -qE '^(packages/|\.changeset/|pnpm-lock\.yaml|\.github/workflows/)'; then
              run=false
            fi
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
      - name: Build for the scaffold smoke
        if: steps.scope.outputs.run == 'true'
        run: pnpm build
      - name: Verify scaffold (pack, install, build a real app)
        if: steps.scope.outputs.run == 'true'
        run: pnpm --filter create-hogsend verify
