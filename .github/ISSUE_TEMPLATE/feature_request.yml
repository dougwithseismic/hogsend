name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
      placeholder: I'm trying to ... but currently ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about or tried?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Worker / Hatchet
        - Journeys
        - Email / Resend
        - Database
        - CLI
        - Docker / Infrastructure
        - Other
    validations:
      required: true
