name: Question
description: Ask a question about setup, usage, or architecture
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you want to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do? What have you tried so far?
    validations:
      required: false
