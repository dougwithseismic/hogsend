[build]
# Same Dockerfile as the API service — one image, run as the worker (see below).
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Watch the whole monorepo source so engine/shared-package changes trigger a
# redeploy. @hogsend/api bundles all of packages/** via tsup noExternal, so any
# package edit is a real input for the worker too. Override in the dashboard if
# you need a narrower scope.
watchPatterns = [
  "apps/api/**",
  "packages/**",
  "Dockerfile",
  ".dockerignore",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "railway.worker.toml",
]

[deploy]
# Run mode = worker (node directly, not pnpm — see railway.toml / Dockerfile).
startCommand = "node apps/api/dist/worker.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
