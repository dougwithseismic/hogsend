version: 2

project_name: hogsend

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: hogsend
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/hogsend/cli/cmd.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: dougwithseismic
    name: hogsend
  prerelease: auto
  name_template: "Hogsend CLI v{{.Version}}"
